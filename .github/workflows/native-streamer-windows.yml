name: native-streamer-windows

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "opennow-native-streamer/**"
      - "opennow-stable/src/main/services/nativeStreamerManager.ts"
      - ".github/workflows/native-streamer-windows.yml"
  push:
    branches:
      - dev
      - main
    paths:
      - "opennow-native-streamer/**"
      - "opennow-stable/src/main/services/nativeStreamerManager.ts"
      - ".github/workflows/native-streamer-windows.yml"

jobs:
  build-native-streamer-windows:
    name: build-native-streamer-windows-x64
    runs-on: blacksmith-4vcpu-windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install GStreamer MSVC SDK
        shell: powershell
        run: |
          choco install -y gstreamer gstreamer-devel
          $gstRoot = "C:\gstreamer\1.0\msvc_x86_64"
          if (-not (Test-Path "$gstRoot\bin")) {
            throw "Expected GStreamer installation at $gstRoot"
          }
          "GSTREAMER_1_0_ROOT_MSVC_X86_64=$gstRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_CONFIG_PATH=$gstRoot\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PATH=$gstRoot\bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run Rust tests
        shell: powershell
        run: cargo test --manifest-path opennow-native-streamer/Cargo.toml

      - name: Build release executable
        shell: powershell
        run: cargo build --release --manifest-path opennow-native-streamer/Cargo.toml

      - name: Stage artifact
        shell: powershell
        run: |
          $artifactRoot = "native-streamer-artifact"
          $targetDir = Join-Path $artifactRoot "native-bin\win32-x64"
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          Copy-Item "opennow-native-streamer\target\release\opennow-native-streamer.exe" (Join-Path $targetDir "opennow-native-streamer.exe")
          @"
          Artifact contents:
          - native-bin\win32-x64\opennow-native-streamer.exe

          Development placement:
          - copy native-bin\win32-x64\opennow-native-streamer.exe into opennow-stable\native-bin\win32-x64\

          Alternative runtime override:
          - set OPENNOW_NATIVE_STREAMER_BIN to the full path of opennow-native-streamer.exe

          Runtime dependency:
          - install the 64-bit GStreamer MSVC runtime on the target Windows machine so the executable can load GStreamer DLLs
          "@ | Out-File -FilePath (Join-Path $artifactRoot "README.txt") -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opennow-native-streamer-windows-x64
          path: native-streamer-artifact/**
          if-no-files-found: error
