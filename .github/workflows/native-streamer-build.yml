name: native-streamer-build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "opennow-native-streamer/**"
      - ".github/workflows/native-streamer-build.yml"
  push:
    branches:
      - main
      - dev
    paths:
      - "opennow-native-streamer/**"
      - ".github/workflows/native-streamer-build.yml"

concurrency:
  group: native-streamer-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-amd64
            os: blacksmith-4vcpu-windows-2025
            goos: windows
            goarch: amd64
            binary_name: opennow-native-streamer.exe
            artifact_name: opennow-native-streamer-windows-amd64
            shell: pwsh
          - label: macos-amd64
            os: macos-13
            goos: darwin
            goarch: amd64
            binary_name: opennow-native-streamer
            artifact_name: opennow-native-streamer-macos-amd64
            shell: bash
          - label: macos-arm64
            os: macos-14
            goos: darwin
            goarch: arm64
            binary_name: opennow-native-streamer
            artifact_name: opennow-native-streamer-macos-arm64
            shell: bash
          - label: linux-amd64
            os: ubuntu-24.04
            goos: linux
            goarch: amd64
            binary_name: opennow-native-streamer
            artifact_name: opennow-native-streamer-linux-amd64
            shell: bash

    defaults:
      run:
        working-directory: opennow-native-streamer
        shell: ${{ matrix.shell }}

    env:
      CGO_ENABLED: "1"
      GO111MODULE: "on"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      BINARY_NAME: ${{ matrix.binary_name }}
      ARTIFACT_NAME: ${{ matrix.artifact_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: opennow-native-streamer/go.mod
          cache: true
          cache-dependency-path: opennow-native-streamer/go.sum

      - name: Setup MSYS2 toolchain
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: inherit
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-gstreamer
            mingw-w64-ucrt-x86_64-gst-plugins-base
            mingw-w64-ucrt-x86_64-SDL2

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libsdl2-dev

      - name: Install macOS native dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config gstreamer gst-plugins-base sdl2

      - name: Verify Windows native toolchain
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          export CC=gcc
          export CXX=g++
          export PKG_CONFIG=${PKG_CONFIG:-pkgconf}
          which go
          which "$CC"
          which "$CXX"
          which "$PKG_CONFIG"
          go version
          "$PKG_CONFIG" --modversion gstreamer-1.0
          "$PKG_CONFIG" --modversion gstreamer-app-1.0
          "$PKG_CONFIG" --modversion gstreamer-video-1.0
          "$PKG_CONFIG" --modversion sdl2

      - name: Configure Unix CGO environment
        if: runner.os != 'Windows'
        run: |
          echo "PKG_CONFIG=pkg-config" >> "$GITHUB_ENV"
          echo "CC=clang" >> "$GITHUB_ENV"
          echo "CXX=clang++" >> "$GITHUB_ENV"

      - name: Verify Unix native toolchain
        if: runner.os != 'Windows'
        run: |
          go version
          ${PKG_CONFIG:-pkg-config} --modversion gstreamer-1.0
          ${PKG_CONFIG:-pkg-config} --modversion gstreamer-app-1.0
          ${PKG_CONFIG:-pkg-config} --modversion gstreamer-video-1.0
          pkg-config --modversion sdl2

      - name: Build native streamer on Unix
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/${ARTIFACT_NAME}
          go build -trimpath -tags gstreamer -o dist/${ARTIFACT_NAME}/${BINARY_NAME} ./cmd/opennow-native-streamer

      - name: Build native streamer on Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          export CC=gcc
          export CXX=g++
          export PKG_CONFIG=${PKG_CONFIG:-pkgconf}
          mkdir -p "dist/${ARTIFACT_NAME}"
          go build -trimpath -tags gstreamer -o "dist/${ARTIFACT_NAME}/${BINARY_NAME}" ./cmd/opennow-native-streamer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: opennow-native-streamer/dist/${{ matrix.artifact_name }}/
          if-no-files-found: error

  # Linux arm64 is intentionally not included yet.
  # The project targets Linux ARM/Raspberry Pi in architecture, but CI support is deferred
  # until a stable arm64 runner + reproducible GStreamer/SDL2 dependency path is validated.
